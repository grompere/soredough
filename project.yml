name: IronLog 2
options:
  bundleIdPrefix: com.soredough
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: none

targets:
  IronLog 2:
    type: application
    platform: iOS
    sources:
      - path: IronLog 2
        excludes:
          - "Tracker backfill"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ironlog.IronLog2
        PRODUCT_NAME: Sore Dough
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "iPhone Distribution"
    info:
      path: IronLog 2/Info.plist
      properties:
        UILaunchScreen: {}
